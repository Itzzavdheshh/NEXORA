<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts preconnect (must be before font link, reduces latency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap"
    />

    <!-- Primary Meta -->
    <title>Nexora — Structured Mentorship for Students</title>
    <meta name="description" content="Nexora connects ambitious students with verified mentors for focused, structured sessions. Book your first session today." />
    <meta name="theme-color" content="#0d1527" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph (for link previews on WhatsApp, Discord, LinkedIn etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Nexora — Structured Mentorship for Students" />
    <meta property="og:description" content="Connect with verified mentors, book focused sessions, and track your academic progress." />
    <meta property="og:image"       content="/favicon.png" />
    <meta property="og:url"         content="https://nexora.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Nexora — Structured Mentorship" />
    <meta name="twitter:description" content="Book focused mentorship sessions with verified mentors on Nexora." />
    <meta name="twitter:image"       content="/favicon.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
